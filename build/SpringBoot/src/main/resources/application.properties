## Spring DATASOURCE (DataSourceAutoConfiguration & DataSourceProperties)
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/inventorymanagementsystem}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:d3e}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:root}
server.port=${PORT:8080}
env.reposerver.url=${ENV_REPOSERVER_URL:http://127.0.0.1:8090/graphql}

# Comma-separated origins for production (e.g. https://freshmart.vercel.app)
app.cors.allowed-origins=${APP_CORS_ALLOWED_ORIGINS:*}

# Email sending props (SendGrid: use API key as password, "apikey" as username)
# When credentials are placeholders, OTP emails are printed to the server console instead.
env.mail.smtp.host=smtp.sendgrid.net
env.mail.smtp.port=587
env.mail.uname=apikey
env.mail.pwd=your-sendgrid-api-key
env.mail.sender=do-not-reply@d3e.studio

# Display props
d3e.showSql=false
d3e.showGraphql=false

# Flyway props
spring.flyway.baseline-on-migrate = true
spring.flyway.baselineVersion = 0
spring.flyway.validate-on-migrate = false

# Storage props
# TODO: Replace with proper value
server.localstore=out


spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true

repo.secret=${REPO_SECRET:gen_secret}
#d3e-studio
jwt.secret=${JWT_SECRET:ZDNlLXN0dWRpby1sYXJnZS1zZWNyZXQta2V5}
#Validity in sec (365D)
jwt.validation=31536000

graphiql.mapping = /api/graphiql
graphiql.endpoint = /api/native/graphql

spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.minimum-idle=1

spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB

spring.main.allow-circular-references=true
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never
spring.application.name=InventoryManagementSystem
spring.boot.admin.client.enabled=false